<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}ORIA{% endblock %}</title>

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#89aff0">
    <meta name="is-logged-in" content="{{ 'true' if session.get('user_id') else 'false' }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/IMG_6064.PNG') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/IMG_6064.PNG') }}">

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=15">

    <!-- JS Libraries -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.3/dist/purify.min.js"></script>
    {% block head %}{% endblock %}
</head>

<body>
    <div id="app-container">
        <!-- Flash Messages -->
        <div class="flash-container position-fixed top-0 start-50 translate-middle-x mt-3"
            style="z-index: 9999; width: 90%; max-width: 400px;">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-custom alert-{{ category }} alert-dismissible fade show shadow-sm text-center fw-bold"
                role="alert">
                {{ message }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"
                    aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        {% block content %}{% endblock %}
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}?v=12"></script>
    <script>
        // Telegram WebApp Authentication Bridge
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            const isLoggedInElement = document.querySelector('meta[name="is-logged-in"]');
            
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tg.ready();
                tg.expand();
                
                if (isLoggedInElement && isLoggedInElement.content === 'false') {
                    const initData = tg.initData;
                    if (initData) {
                        fetch('/api/tg_webapp_login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ init_data: initData })
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success && data.redirect_url) {
                                window.location.href = data.redirect_url;
                            } else if (data.error) {
                                console.warn("WebApp Auto-login failed:", data.error);
                            }
                        })
                        .catch(err => console.error("WebApp Login Error:", err));
                    }
                }
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}")
                    .then(reg => console.log('Service worker registered.', reg))
                    .catch(err => console.log('Service worker registration failed.', err));
            });
        }
    </script>
</body>

</html>
